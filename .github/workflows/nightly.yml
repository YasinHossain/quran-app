name: Nightly Suite

on:
  schedule:
    - cron: '0 3 * * *' # Daily at 03:00 UTC
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  tests-and-lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run nightly tests (unit+integration+ui)
        run: npm run test:nightly

      - name: Build application
        run: npm run build

      - name: Run Lighthouse report
        run: npm run lhci

      - name: Upload Lighthouse report (if present)
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouseci/**
          retention-days: 14
